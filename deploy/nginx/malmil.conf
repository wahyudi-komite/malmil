upstream malmil_api {
    server 127.0.0.1:3010;
}

upstream malmil_frontend {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name malmil.id www.malmil.id;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name malmil.id www.malmil.id;

    ssl_certificate     /etc/letsencrypt/live/malmil.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/malmil.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 20M;

    # Backend API
    location /api/ {
        proxy_pass http://malmil_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Longer timeout for Midtrans webhook
        proxy_read_timeout 30s;
    }

    # Swagger docs
    location /api/docs {
        proxy_pass http://malmil_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets (cache aggressively)
    location /assets/ {
        proxy_pass http://malmil_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (Angular SSR)
    location / {
        proxy_pass http://malmil_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # No caching for HTML
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/malmil.access.log;
    error_log  /var/log/nginx/malmil.error.log;
}
