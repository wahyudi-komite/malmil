<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-6 sm:p-10">
        <div class="max-w-full">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Kategori</h1>
                <button (click)="openNew()" class="px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-medium flex items-center gap-2">
                    <mat-icon class="icon-size-4" svgIcon="heroicons_outline:plus"></mat-icon>
                    Tambah Kategori
                </button>
            </div>

            <div class="flex gap-4 mb-6">
                <mat-form-field class="w-64" subscriptSizing="dynamic">
                    <input matInput [(ngModel)]="keyword" placeholder="Cari kategori..." />
                </mat-form-field>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 overflow-hidden">
                <table mat-table [dataSource]="paged" class="w-full">
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef>Nama</th>
                        <td mat-cell *matCellDef="let v" class="font-medium">{{ v.name }}</td>
                    </ng-container>
                    <ng-container matColumnDef="slug">
                        <th mat-header-cell *matHeaderCellDef>Slug</th>
                        <td mat-cell *matCellDef="let v" class="text-sm text-gray-500 dark:text-gray-400">{{ v.slug }}</td>
                    </ng-container>
                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef>Status</th>
                        <td mat-cell *matCellDef="let v">
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                                  [class.bg-green-100]="v.is_active"
                                  [class.text-green-800]="v.is_active"
                                  [class.bg-red-100]="!v.is_active"
                                  [class.text-red-800]="!v.is_active">
                                {{ v.is_active ? 'Aktif' : 'Nonaktif' }}
                            </span>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="created">
                        <th mat-header-cell *matHeaderCellDef>Dibuat</th>
                        <td mat-cell *matCellDef="let v" class="text-sm text-gray-500 dark:text-gray-400">{{ v.created_at | date:'dd MMM yyyy' }}</td>
                    </ng-container>
                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let v" class="text-right">
                            <button mat-icon-button color="primary" (click)="openEdit(v)" matTooltip="Edit">
                                <mat-icon svgIcon="heroicons_outline:pencil"></mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteById(v.id)" matTooltip="Hapus">
                                <mat-icon svgIcon="heroicons_outline:trash"></mat-icon>
                            </button>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50 dark:bg-gray-700 dark:hover:bg-gray-700"></tr>
                </table>
                <mat-paginator [length]="filtered.length" [pageSize]="pageSize" [pageIndex]="page-1"
                               [pageSizeOptions]="[10,25,50]" (page)="onPage($event)"
                               class="border-t border-gray-100 dark:border-gray-700">
                </mat-paginator>
            </div>
        </div>
    </div>

    <div *ngIf="showForm" class="fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black/30" (click)="showForm = false"></div>
        <div class="relative w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-xl dark:shadow-black/20 p-6 mx-4">
            <h2 class="text-xl font-bold mb-6">{{ editId ? 'Edit Kategori' : 'Tambah Kategori' }}</h2>
            <mat-form-field class="w-full" subscriptSizing="dynamic">
                <mat-label>Nama Kategori</mat-label>
                <input matInput [(ngModel)]="formName" name="formName" required minlength="3" #nameCtrl="ngModel" />
                <mat-error *ngIf="nameCtrl.hasError('required')">
                    Nama kategori wajib diisi
                </mat-error>
                <mat-error *ngIf="nameCtrl.hasError('minlength')">
                    Minimal 3 karakter
                </mat-error>
            </mat-form-field>
            <div class="flex gap-3 mt-6">
                <button (click)="save()" [disabled]="saving || nameCtrl.invalid || !formName.trim()"
                        class="px-6 py-2 rounded-lg bg-gray-900 text-white text-sm font-medium disabled:opacity-50">
                    {{ saving ? 'Menyimpan...' : 'Simpan' }}
                </button>
                <button *ngIf="editId" (click)="deleteById(editId)" class="px-6 py-2 rounded-lg bg-red-100 text-red-800 text-sm font-medium">
                    Hapus
                </button>
                <button (click)="showForm = false" class="px-6 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm">Batal</button>
            </div>
        </div>
    </div>
</div>
