<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-6 sm:p-10">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Audit Log</h1>

            <div class="flex gap-4 mb-6 items-end">
                <mat-form-field class="w-64" subscriptSizing="dynamic">
                    <input matInput [(ngModel)]="keyword" (keyup.enter)="search()" placeholder="Cari user/aksi..." />
                </mat-form-field>
                <mat-form-field class="w-48" subscriptSizing="dynamic">
                    <mat-label>Aksi</mat-label>
                    <mat-select [(ngModel)]="actionFilter" (selectionChange)="search()">
                        <mat-option value="">Semua</mat-option>
                        <mat-option *ngFor="let a of actions" [value]="a">{{ a }}</mat-option>
                    </mat-select>
                </mat-form-field>
                <button mat-stroked-button (click)="search()">Cari</button>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 overflow-hidden">
                <table mat-table [dataSource]="data" class="w-full">
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef>Aksi</th>
                        <td mat-cell *matCellDef="let v">
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                                  [class]="actionClass(v.action)">{{ v.action }}</span>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="user">
                        <th mat-header-cell *matHeaderCellDef>User</th>
                        <td mat-cell *matCellDef="let v" class="text-sm">{{ v.userEmail || '-' }}</td>
                    </ng-container>
                    <ng-container matColumnDef="resource">
                        <th mat-header-cell *matHeaderCellDef>Resource</th>
                        <td mat-cell *matCellDef="let v" class="text-sm">{{ v.resource }}{{ v.resourceId ? ' #' + v.resourceId.substring(0,8) : '' }}</td>
                    </ng-container>
                    <ng-container matColumnDef="description">
                        <th mat-header-cell *matHeaderCellDef>Deskripsi</th>
                        <td mat-cell *matCellDef="let v" class="text-sm max-w-xs truncate">{{ v.description }}</td>
                    </ng-container>
                    <ng-container matColumnDef="ip">
                        <th mat-header-cell *matHeaderCellDef>IP</th>
                        <td mat-cell *matCellDef="let v" class="text-sm font-mono">{{ v.ip || '-' }}</td>
                    </ng-container>
                    <ng-container matColumnDef="created">
                        <th mat-header-cell *matHeaderCellDef>Waktu</th>
                        <td mat-cell *matCellDef="let v" class="text-sm text-gray-500">{{ v.created_at | date:'dd MMM yyyy, HH:mm' }}</td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50"></tr>
                </table>
                <mat-paginator [length]="total" [pageSize]="pageSize" [pageIndex]="page-1"
                               [pageSizeOptions]="[10,25,50,100]" (page)="onPage($event)" class="border-t border-gray-100">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
