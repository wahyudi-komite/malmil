<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-6 sm:p-10">
        <div class="max-w-full">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Produk</h1>
                <a routerLink="/products/new" class="px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-medium flex items-center gap-2">
                    <mat-icon class="icon-size-4" svgIcon="heroicons_outline:plus"></mat-icon>
                    Tambah Produk
                </a>
            </div>

            <!-- Filters -->
            <div class="flex gap-4 mb-6">
                <mat-form-field class="w-64" subscriptSizing="dynamic">
                    <input matInput [(ngModel)]="keyword" (keyup.enter)="search()" placeholder="Cari produk..." />
                </mat-form-field>
                <mat-form-field class="w-48" subscriptSizing="dynamic">
                    <mat-select [(ngModel)]="categoryFilter" (selectionChange)="search()">
                        <mat-option value="">Semua Kategori</mat-option>
                        <mat-option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</mat-option>
                    </mat-select>
                </mat-form-field>
                <button mat-stroked-button (click)="search()">Cari</button>
            </div>

            <!-- Table -->
            <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 overflow-hidden">
                <table mat-table [dataSource]="data" class="w-full">
                    <ng-container matColumnDef="image">
                        <th mat-header-cell *matHeaderCellDef class="w-16"></th>
                        <td mat-cell *matCellDef="let v">
                            <img *ngIf="getPrimaryImage(v); else noImg" [src]="getPrimaryImage(v)" class="w-10 h-10 object-cover rounded" />
                            <ng-template #noImg><div class="w-10 h-10 bg-gray-50 dark:bg-gray-700 rounded flex items-center justify-center text-lg">🍿</div></ng-template>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef>Nama</th>
                        <td mat-cell *matCellDef="let v" class="font-medium">{{ v.name }}</td>
                    </ng-container>
                    <ng-container matColumnDef="category">
                        <th mat-header-cell *matHeaderCellDef>Kategori</th>
                        <td mat-cell *matCellDef="let v" class="text-gray-500 dark:text-gray-400 text-sm">{{ v.category?.name || '-' }}</td>
                    </ng-container>
                    <ng-container matColumnDef="price">
                        <th mat-header-cell *matHeaderCellDef>Harga</th>
                        <td mat-cell *matCellDef="let v">{{ v.base_price | number:'':'id' }}</td>
                    </ng-container>
                    <ng-container matColumnDef="stock">
                        <th mat-header-cell *matHeaderCellDef>Stok</th>
                        <td mat-cell *matCellDef="let v" [className]="getStockClass(v)" class="text-sm font-medium">{{ getStockLabel(v) }}</td>
                    </ng-container>
                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef>Status</th>
                        <td mat-cell *matCellDef="let v">
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                                  [class.bg-green-100 dark:bg-green-900/30]="v.is_active"
                                  [class.text-green-800 dark:text-green-300]="v.is_active"
                                  [class.bg-red-100 dark:bg-red-900/30]="!v.is_active"
                                  [class.text-red-800 dark:text-red-300]="!v.is_active">
                                {{ v.is_active ? 'Aktif' : 'Nonaktif' }}
                            </span>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let v" class="text-right">
                            <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon svgIcon="heroicons_outline:ellipsis-vertical"></mat-icon></button>
                            <mat-menu #menu="matMenu">
                                <a mat-menu-item [routerLink]="['/products', v.id, 'edit']">
                                    <mat-icon svgIcon="heroicons_outline:pencil"></mat-icon> Edit
                                </a>
                                <button mat-menu-item (click)="delete(v.id)">
                                    <mat-icon svgIcon="heroicons_outline:trash"></mat-icon> Hapus
                                </button>
                            </mat-menu>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50 dark:bg-gray-700 dark:hover:bg-gray-700"></tr>
                </table>
                <mat-paginator [length]="total" [pageSize]="pageSize" [pageIndex]="page-1"
                               [pageSizeOptions]="[10,25,50]" (page)="onPage($event)" class="border-t border-gray-100 dark:border-gray-700">
                </mat-paginator>
            </div>
        </div>
    </div>
</div>
