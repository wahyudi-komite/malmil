<div class="flex flex-col flex-auto min-w-0">
    <div class="flex-auto p-6 sm:p-10">
        <div class="max-w-5xl mx-auto">
            <div class="mb-8">
                <a routerLink="/products" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white dark:text-white">&larr; Kembali</a>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mt-2">{{ isEdit ? 'Edit' : 'Tambah' }} Produk</h1>
            </div>

            <div class="space-y-6">
                <!-- Basic Info -->
                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700">
                    <h2 class="text-lg font-semibold mb-4">Informasi Dasar</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <mat-form-field class="col-span-2" subscriptSizing="dynamic">
                            <mat-label>Nama Produk</mat-label>
                            <input matInput [(ngModel)]="product.name" required />
                        </mat-form-field>
                        <mat-form-field subscriptSizing="dynamic">
                            <mat-label>Kategori</mat-label>
                            <mat-select [(ngModel)]="product.category_id">
                                <mat-option value="">Tidak Ada</mat-option>
                                <mat-option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</mat-option>
                            </mat-select>
                        </mat-form-field>
                        <mat-form-field subscriptSizing="dynamic">
                            <mat-label>Harga Dasar (Rp)</mat-label>
                            <input matInput type="number" [(ngModel)]="product.base_price" required />
                        </mat-form-field>
                        <mat-form-field class="col-span-2" subscriptSizing="dynamic">
                            <mat-label>Deskripsi</mat-label>
                            <textarea matInput rows="4" [(ngModel)]="product.description"></textarea>
                        </mat-form-field>
                        <mat-form-field subscriptSizing="dynamic">
                            <mat-label>Berat (gram)</mat-label>
                            <input matInput type="number" [(ngModel)]="product.weight_grams" />
                        </mat-form-field>
                        <mat-form-field subscriptSizing="dynamic">
                            <mat-label>Urutan</mat-label>
                            <input matInput type="number" [(ngModel)]="product.sort_order" />
                        </mat-form-field>
                    </div>
                    <div class="flex gap-6 mt-4">
                        <mat-slide-toggle [(ngModel)]="product.is_active">Aktif</mat-slide-toggle>
                        <mat-slide-toggle [(ngModel)]="product.is_featured">Unggulan</mat-slide-toggle>
                    </div>
                </div>

                <!-- Images -->
                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold">Gambar</h2>
                        <button mat-stroked-button (click)="addImage()">+ Tambah</button>
                    </div>
                    <div *ngFor="let img of product.images; let i = index" class="flex gap-4 items-start mb-3 p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                        <img *ngIf="img.url" [src]="img.url" class="w-16 h-16 object-cover rounded" />
                        <div class="flex-1 space-y-2">
                            <input type="file" accept="image/*" (change)="uploadImage(i, $event)" class="text-sm" />
                            <input [(ngModel)]="img.alt_text" placeholder="Alt text" class="w-full px-2 py-1 text-sm rounded border border-gray-300 dark:border-gray-600 dark:border-gray-600" />
                            <label class="text-sm flex items-center gap-2">
                                <input type="checkbox" [(ngModel)]="img.is_primary" /> Utama
                            </label>
                        </div>
                        <button mat-icon-button (click)="removeImage(i)" class="text-red-500"><mat-icon svgIcon="heroicons_outline:x-mark"></mat-icon></button>
                    </div>
                </div>

                <!-- Variants -->
                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold">Varian</h2>
                        <button mat-stroked-button (click)="addVariant()">+ Tambah</button>
                    </div>
                    <div *ngFor="let v of product.variants; let i = index" class="p-4 mb-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                        <div class="grid grid-cols-5 gap-3 items-end">
                            <mat-form-field subscriptSizing="dynamic">
                                <mat-label>SKU</mat-label>
                                <input matInput [(ngModel)]="v.sku" />
                            </mat-form-field>
                            <mat-form-field subscriptSizing="dynamic">
                                <mat-label>Nama</mat-label>
                                <input matInput [(ngModel)]="v.name" />
                            </mat-form-field>
                            <mat-form-field subscriptSizing="dynamic">
                                <mat-label>Harga</mat-label>
                                <input matInput type="number" [(ngModel)]="v.price_override" />
                            </mat-form-field>
                            <mat-form-field subscriptSizing="dynamic">
                                <mat-label>Stok</mat-label>
                                <input matInput type="number" [(ngModel)]="v.stock_qty" />
                            </mat-form-field>
                            <div class="flex items-center gap-2 pb-2">
                                <mat-slide-toggle [(ngModel)]="v.is_active"></mat-slide-toggle>
                                <button mat-icon-button (click)="removeVariant(i)" class="text-red-500"><mat-icon svgIcon="heroicons_outline:trash"></mat-icon></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="flex gap-3">
                    <button mat-flat-button color="primary" (click)="save()" [disabled]="loading" class="px-8 py-3 rounded-lg bg-gray-900 text-white font-medium">
                        {{ loading ? 'Menyimpan...' : 'Simpan' }}
                    </button>
                    <a routerLink="/products" mat-stroked-button class="px-8 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:border-gray-600">Batal</a>
                </div>
            </div>
        </div>
    </div>
</div>
