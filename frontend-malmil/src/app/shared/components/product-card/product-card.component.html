<a [routerLink]="['/product', product.slug]"
   class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow border border-gray-100">
    <div class="aspect-square bg-gray-50 overflow-hidden">
        <img *ngIf="primaryImage; else placeholder"
             [src]="primaryImage"
             [alt]="product.name"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
             loading="lazy" />
        <ng-template #placeholder>
            <div class="w-full h-full flex items-center justify-center text-gray-300">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
        </ng-template>
    </div>
    <div class="p-4">
        <h3 class="font-medium text-gray-900 text-sm group-hover:text-amber-600 transition-colors line-clamp-2">
            {{ product.name }}
        </h3>
        <p class="mt-1 font-semibold text-amber-700">
            {{ product.base_price | currencyIdr }}
        </p>
    </div>
</a>
