<header class="sticky top-0 z-40 w-full bg-white/95 backdrop-blur-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a routerLink="/" class="flex items-center space-x-2">
                <span class="text-2xl font-bold tracking-tight" style="color: #C8956C;">MALMIL</span>
            </a>

            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center space-x-8">
                <a routerLink="/" class="text-sm font-medium text-gray-700 hover:text-amber-600 transition-colors">Beranda</a>
                <a routerLink="/catalog" class="text-sm font-medium text-gray-700 hover:text-amber-600 transition-colors">Katalog</a>
            </nav>

            <!-- Right Section -->
            <div class="flex items-center space-x-4">

                <!-- Cart -->
                <a routerLink="/cart" class="relative p-2 text-gray-700 hover:text-amber-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                    </svg>
                    <span *ngIf="cartCount > 0" class="absolute -top-1 -right-1 flex items-center justify-center w-5 h-5 text-xs font-bold text-white bg-amber-600 rounded-full">
                        {{ cartCount }}
                    </span>
                </a>

                <!-- Hamburger (mobile) -->
                <button (click)="toggleMenu()" class="md:hidden p-2 text-gray-700 hover:text-amber-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="menuOpen" class="md:hidden border-t border-gray-100 bg-white">
        <div class="px-4 py-3 space-y-2">
            <a routerLink="/" (click)="menuOpen = false" class="block py-2 text-sm font-medium text-gray-700">Beranda</a>
            <a routerLink="/catalog" (click)="menuOpen = false" class="block py-2 text-sm font-medium text-gray-700">Katalog</a>
        </div>
    </div>
</header>
